# ─────────────────────────────────────────────
#  CFD Bot – Global Settings
# ─────────────────────────────────────────────

# How often to scan for signals (minutes)
scan_interval_minutes: 60

# Default timeframe for all instruments (can be overridden per instrument)
# Valid: 1m 5m 15m 30m 1h 4h 1d
default_timeframe: "1h"

# How many candles to fetch for analysis
candle_lookback: 200

# ── Risk Management ──────────────────────────
risk:
  # Max % of account to risk per trade
  account_risk_percent: 1.5
  # Account balance (update this to your real balance)
  account_balance: 10000
  # ATR multiplier for stop-loss placement
  sl_atr_multiplier: 1.5
  # Risk:Reward ratio (e.g. 2 = TP is 2x the SL distance)
  risk_reward_ratio: 2.0
  # Max open signals at once (0 = unlimited)
  max_open_signals: 3
  # Stop scanning for the day if daily loss hits this %
  daily_loss_limit_percent: 5.0

# ── Signal Engine ─────────────────────────────
signals:
  # Minimum number of indicators that must agree for a signal
  min_confluence: 3
  # Indicators to use (all enabled by default)
  indicators:
    ema_cross: true
    rsi: true
    macd: true
    bollinger: true
    atr: true

# ── Notifications ─────────────────────────────
notifications:
  console: true
  telegram:
    enabled: false
    bot_token: "YOUR_TELEGRAM_BOT_TOKEN"
    chat_id: "YOUR_CHAT_ID"

# ── Instruments to scan ───────────────────────
# Add or remove symbols here. Each needs a matching file in config/instruments/
active_instruments:
  - XAUUSD   # Gold
  - US30     # Dow Jones
  - EURUSD   # Euro/USD Forex
